<html>
    <head>
        <title>JS Operations</title>
        <script>
            //Addition,Substraction,Multiplication,Division
            let a = 10;
            let b = 5;
            let c= a+b; 

            console.log(c);
            console.log(a-b);
            console.log(a*5);
            console.log(a/3);

            // moduler 

            let x = 100;
            let y = 33;

            console.log(x % y);

            //Comparison operators

            let p =10;
            let q = 15;

            console.log(p>q);
            console.log(p>=10);
            console.log(p<q);
            console.log(p<=5);
            console.log(p!=q);

            //Increment and Decrement 

            let r = 22;
            
            r++;
            console.log(r++);   //post increment //value 24
            console.log(r)      // value 25

            console.log(++r)   //pre increment

            //AND && ,OR || ,NOT !

            let d = true;
            let e = false ;

            console.log(d && e);
            console.log(d || e);
            console.log(!d);
    

        </script>

    </head>
    <body>
        <h1>JS Operations</h1>
    </body>
</html>
