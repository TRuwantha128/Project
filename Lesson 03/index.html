<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variable Declaration</title>
    <script>
        let myString  = "Tharindu";
        let myBool = true;
        myBool = false;

        let myNull =null;

        let unDefined = undefined;

        let myObject = {
            name:"Kamal",
            age:25
        }
        console.log(myObject);

        let myArray=[1,2,3,4,5,6,7,8]
        console.log(myArray);

        let myFunction = function(){
            console.log("test");
        }

        console.log(typeof unDefined);
        console.log(typeof myArray);
        console.log(typeof myObject);
        console.log(typeof 23.45);

        //Operations 
        /*
        this is multy Line
        Comment

        */

        let a=4;
        let b = 5;
        let c = a+b;

        console.log(c);
        console.log(typeof c);

        console.log(b/2);
        console.log(b*2);

        console.log(5%2);
        //Increment
        a++;
        console.log(a);

        a+=4;
        console.log(a);

        //Decremenr

        a--;
        console.log(a);

        let firstName="Tharindu ";
        let lastName= " Ruwantha";

        let fullName = firstName+lastName;
        console.log(fullName);



    </script>
</head>

    Variable Declaration
</body>
</html>
