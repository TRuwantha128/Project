<html>
    <head>
        <title>Comparison Operator & Logical Operator</title>
    </head>
    <body>
        <p>Input1 : <input type="text" id = "input1" ></p>
        <p>Input2 : <input type ="text" id = "input2" ></p>
        <p><button onclick="compare()">Compare</button></p>
        <div id="result"></div>

        <script>

            function compare(){
            let input1 = document.getElementById("input1").value;
            let input2 = document.getElementById("input2").value;
            // input1 = Number(input1);
            // input1 = Number(input2);

            input1 = parseInt(input1);
            input2 = parseFloat(input2);
            
            console.log("Input : ",typeof input1,typeof input2);
            let output = '';

            if(input1 == input2){
                   console.log("input1 = input 2");
                   output = "input1 == input2";
            }else if(input1>input2){
                console.log("input1>input2");
                output = "input1 > input2";
            }else{
                console.log("input1<input2");
                output = "input1 < input2";
            }
            document.getElementById("result").innerHTML = output;

            //===
            if(input1===input2){
                console.log("input1===input2");
                output = "input1 === input2";
                document.getElementById("result").innerHTML=output;
            }
            

            }

        </script>

    </body>
</html>
